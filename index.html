<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>승강기 안전 OX 퀴즈</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:linear-gradient(180deg,#eaf7ff,#fff7df);color:#123;overflow:hidden} .app{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:18px} .card{width:min(1180px,100%);height:min(760px,100%);background:white;border-radius:30px;box-shadow:0 12px 35px rgba(0,68,130,.22);border:5px solid #9fd1ff;overflow:hidden;position:relative} .start{height:100%;display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:center;padding:36px;background:radial-gradient(circle at 20% 10%,#fff 0,#effaff 35%,#cdeeff 100%)} h1{font-size:64px;margin:0 0 12px;text-align:center;color:#0b65c8;text-shadow:3px 3px 0 #fff} .subtitle{font-size:34px;text-align:center;font-weight:900;color:#f58220;margin:8px 0 20px} .char{width:100%;max-height:520px;object-fit:contain;border-radius:24px;background:white;padding:10px} .startBtn,.bigBtn,.nextBtn{border:0;border-radius:24px;font-weight:900;cursor:pointer;box-shadow:0 8px 0 rgba(0,0,0,.12);transition:.08s} .startBtn{display:block;margin:30px auto 0;background:linear-gradient(#ffe27c,#ffb300);font-size:42px;padding:24px 70px;color:#7a3d00;border:4px solid #fff} .startBtn:active,.bigBtn:active,.nextBtn:active{transform:translateY(4px);box-shadow:0 4px 0 rgba(0,0,0,.12)} .game{height:100%;display:none;grid-template-rows:auto 1fr auto;background:#f7fbff} .top{display:flex;align-items:center;justify-content:space-between;background:#0b65c8;color:white;padding:14px 28px;font-weight:900;font-size:28px} .pill{background:white;color:#0b65c8;border-radius:40px;padding:8px 22px} .speaker{font-size:28px;background:#ffd34d;border:0;border-radius:50%;width:60px;height:60px;cursor:pointer} .content{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;padding:22px;height:100%;min-height:0} .imageBox{background:white;border-radius:24px;border:4px solid #c8e4ff;display:flex;align-items:center;justify-content:center;min-height:0;padding:8px} .imageBox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:18px} .questionBox{display:flex;flex-direction:column;gap:18px;align-items:center;justify-content:center} .question{font-size:38px;line-height:1.35;text-align:center;font-weight:900;background:white;border-radius:28px;border:4px solid #c8e4ff;padding:26px;color:#111;word-break:keep-all} .buttons{display:flex;gap:28px;width:100%;justify-content:center} .bigBtn{font-size:72px;width:190px;height:125px;color:white} .o{background:linear-gradient(#38a6ff,#006bcf)} .x{background:linear-gradient(#ff6464,#e20d0d)} .feedback{display:none;position:absolute;inset:0;background:rgba(255,255,255,.96);align-items:center;justify-content:center;text-align:center;z-index:5;padding:30px} .fbInner{width:min(760px,90%);border-radius:36px;background:#fff;border:6px solid #9fd1ff;box-shadow:0 10px 30px rgba(0,0,0,.18);padding:38px} .fbTitle{font-size:62px;font-weight:900;margin-bottom:16px} .fbExplain{font-size:36px;font-weight:900;line-height:1.35;word-break:keep-all} .nextBtn{margin-top:28px;background:#28b24b;color:white;font-size:34px;padding:20px 48px} .result{display:none;height:100%;align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#fff3c6,#e8f7ff);padding:30px} .result h2{font-size:64px;color:#6e35c9;margin:0 0 12px} .score{font-size:78px;font-weight:900;color:#e22626;margin:16px} .note{font-size:34px;font-weight:900} @media(max-width:850px){.start{grid-template-columns:1fr;padding:24px} h1{font-size:42px} .subtitle{font-size:26px} .content{grid-template-columns:1fr;grid-template-rows:50% 50%;gap:10px;padding:12px} .question{font-size:26px;padding:16px} .bigBtn{font-size:54px;width:135px;height:90px} .top{font-size:20px;padding:10px 16px} .card{border-radius:18px}}
</style>
</head>
<body>
<div class="app"><div class="card">
  <section id="start" class="start">
    <div>
      <h1>승강기 안전<br>O/X 퀴즈</h1>
      <div class="subtitle">20문제 중 중복 없이 10문제 랜덤!</div>
      <button class="startBtn" onclick="startGame()">⭐ 시작하기 ⭐</button>
    </div>
    <img class="char" src="images/start_characters.png" alt="엘리와 에스 캐릭터">
  </section>
  <section id="game" class="game">
    <div class="top"><div class="pill" id="count">문제 1 / 10</div><div>⭐ <span id="scoreTop">0</span></div><button class="speaker" onclick="speakCurrent()">🔊</button></div>
    <div class="content"><div class="imageBox"><img id="qImg" alt="문제 그림"></div><div class="questionBox"><div id="qText" class="question"></div><div class="buttons"><button class="bigBtn o" onclick="answer('O')">O</button><button class="bigBtn x" onclick="answer('X')">X</button></div></div></div>
  </section>
  <section id="result" class="result"><div><h2>참 잘했어요!</h2><div class="score"><span id="finalScore">0</span> / 10</div><div id="resultNote" class="note"></div><button class="startBtn" onclick="startGame()">다시하기</button></div></section>
  <div id="feedback" class="feedback"><div class="fbInner"><div id="fbTitle" class="fbTitle"></div><div id="fbExplain" class="fbExplain"></div><button class="nextBtn" onclick="nextQuestion()">다음 문제 ▶</button></div></div>
</div></div>
<script>
const ALL_QUESTIONS = [{"id": 1, "image": "q_button.png", "text": "재미있으니까 엘리베이터 버튼을 여러 개 눌러도 괜찮아요.", "answer": "X", "explain": "필요한 층 버튼만 눌러요."}, {"id": 2, "image": "q_wait.png", "text": "엘리베이터를 기다릴 때는 한 걸음 뒤에서 기다려요.", "answer": "O", "explain": "문 앞에서 한 걸음 뒤로 물러서요."}, {"id": 3, "image": "q_push.png", "text": "에스컬레이터에서 친구를 밀며 장난쳐도 괜찮아요.", "answer": "X", "explain": "밀거나 뛰면 넘어질 수 있어요."}, {"id": 4, "image": "q_handrail.png", "text": "에스컬레이터에서는 손잡이를 잡고 타요.", "answer": "O", "explain": "손잡이를 잡고 바르게 서요."}, {"id": 5, "image": "q_footdoor.png", "text": "닫히는 엘리베이터 문은 발로 막아도 괜찮아요.", "answer": "X", "explain": "문이 닫히면 발이나 손으로 막지 않아요."}, {"id": 6, "image": "q_exitfirst.png", "text": "내리는 사람이 모두 내린 후 엘리베이터를 타요.", "answer": "O", "explain": "내리는 사람이 먼저예요."}, {"id": 7, "image": "q_runesc.png", "text": "빨리 가려고 에스컬레이터에서 뛰어 올라가도 괜찮아요.", "answer": "X", "explain": "에스컬레이터에서는 뛰지 않아요."}, {"id": 8, "image": "q_bell.png", "text": "엘리베이터에 갇히면 비상벨을 눌러 도움을 요청해요.", "answer": "O", "explain": "비상벨을 누르고 침착하게 기다려요."}, {"id": 9, "image": "q_dogok.png", "text": "강아지는 안고 타는 것이 안전해요.", "answer": "O", "explain": "목줄이 문에 끼지 않도록 안고 타요."}, {"id": 10, "image": "q_dogleash.png", "text": "강아지 목줄이 문에 끼어도 그냥 타면 괜찮아요.", "answer": "X", "explain": "목줄은 센서가 못 볼 수 있어 위험해요."}, {"id": 11, "image": "q_yellowok.png", "text": "에스컬레이터에서는 노란선 안에 바르게 서요.", "answer": "O", "explain": "발은 노란선 안쪽에 두어요."}, {"id": 12, "image": "q_yellowbad.png", "text": "에스컬레이터 가장자리 노란선 밖에 발을 내밀어도 괜찮아요.", "answer": "X", "explain": "발이 끼일 수 있어 위험해요."}, {"id": 13, "image": "q_jump.png", "text": "엘리베이터 안에서 뛰거나 점프하면 위험해요.", "answer": "O", "explain": "엘리베이터 안에서는 조용히 서 있어요."}, {"id": 14, "image": "q_handdoor.png", "text": "닫히는 엘리베이터 문은 손으로 막아도 괜찮아요.", "answer": "X", "explain": "손이 끼일 수 있어요."}, {"id": 15, "image": "q_force.png", "text": "엘리베이터에 갇히면 문을 억지로 열어 나와야 해요.", "answer": "X", "explain": "문을 열지 말고 비상벨로 도움을 요청해요."}, {"id": 16, "image": "q_button.png", "text": "엘리베이터 버튼은 필요한 것만 눌러요.", "answer": "O", "explain": "장난으로 많이 누르지 않아요."}, {"id": 17, "image": "q_bell.png", "text": "엘리베이터에 갇혔을 때 울면서 문을 흔들어야 해요.", "answer": "X", "explain": "비상벨을 누르고 침착하게 기다려요."}, {"id": 18, "image": "q_exitfirst.png", "text": "어른이나 친구가 내릴 때는 길을 비켜줘요.", "answer": "O", "explain": "서두르지 말고 차례를 지켜요."}, {"id": 19, "image": "q_push.png", "text": "승강기에서는 친구와 장난치지 않아요.", "answer": "O", "explain": "장난은 사고로 이어질 수 있어요."}, {"id": 20, "image": "q_runesc.png", "text": "에스컬레이터에서는 걷지 않고 서서 가요.", "answer": "O", "explain": "손잡이를 잡고 서서 이동해요."}];
let quiz=[], idx=0, score=0, locked=false;
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function makeUniqueRandomQuiz(){
  // 20문제를 먼저 전체 섞은 뒤 앞에서 10개만 뽑습니다.
  // 같은 id가 이미 들어간 문제는 건너뛰어 중복 출제를 확실히 방지합니다.
  const shuffled = shuffle([...ALL_QUESTIONS]);
  const selected = [];
  const usedIds = new Set();
  for(const q of shuffled){
    if(!usedIds.has(q.id)){
      selected.push(q);
      usedIds.add(q.id);
    }
    if(selected.length === 10) break;
  }
  return selected;
}
function startGame(){
  quiz = makeUniqueRandomQuiz();
  idx=0; score=0; locked=false;
  document.getElementById('start').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('game').style.display='grid';
  showQuestion();
}
function showQuestion(){
  locked=false;
  const q=quiz[idx];
  document.getElementById('count').textContent=`문제 ${idx+1} / 10`;
  document.getElementById('scoreTop').textContent=score;
  document.getElementById('qText').textContent=q.text;
  document.getElementById('qImg').src='images/'+q.image;
  document.getElementById('feedback').style.display='none';
}
function answer(choice){
  if(locked) return; locked=true;
  const q=quiz[idx]; const ok = choice===q.answer;
  if(ok) score++;
  document.getElementById('scoreTop').textContent=score;
  document.getElementById('fbTitle').textContent= ok ? '🎉 정답!' : '😊 아쉬워요!';
  document.getElementById('fbTitle').style.color= ok ? '#119944' : '#e22626';
  document.getElementById('fbExplain').innerHTML = `<div style="font-size:84px;line-height:1">${q.answer==='O'?'⭕':'❌'}</div><div style="margin-top:18px">${q.explain}</div>`;
  document.getElementById('feedback').style.display='flex';
  beep(ok);
}
function nextQuestion(){ idx++; if(idx>=quiz.length) showResult(); else showQuestion(); }
function showResult(){
  document.getElementById('game').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('result').style.display='flex';
  document.getElementById('finalScore').textContent=score;
  let prize='', msg='';
  if(score<=5){ prize='🧻 물티슈'; msg='조금 더 연습해요!'; }
  else if(score<=7){ prize='📖 놀이책'; msg='잘했어요!'; }
  else if(score<=9){ prize='🔶 딱지'; msg='정말 잘했어요!'; }
  else { prize='🧩 퍼즐'; msg='승강기 안전왕!'; }
  const stars = '⭐'.repeat(score) + '☆'.repeat(10-score);
  document.getElementById('resultNote').innerHTML = `<div style="font-size:42px;margin-bottom:12px">${stars}</div><div>${msg}</div><div style="margin-top:16px;color:#e22626">오늘의 상품: ${prize}</div>`;
}
function speakCurrent(){
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(quiz[idx].text); u.lang='ko-KR'; u.rate=.85; speechSynthesis.speak(u); }catch(e){}
}
function beep(ok){
  try{ const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=ok?880:220; g.gain.value=.06; o.start(); setTimeout(()=>{o.stop();ctx.close();}, ok?180:320); }catch(e){}
}
</script>
</body>
</html>
